{% extends "base.html" %}
{% block content %}

<div class="page-header page-header-primary">
    <h1><i class="fas fa-th-large me-2"></i>Dashboard</h1>
    <p>Manage your family activities effortlessly.</p>
</div>

<div class="row g-4">
    <div class="col-md-6 col-lg-4">
        <a href="{{ url_for('chat.familychat') }}" class="card-link">
            <div class="card feature-card feature-card-chat h-100">
                <div class="feature-icon"><i class="fas fa-comments"></i></div>
                <h5>Family Chat</h5>
                <p>Connect with family members in real-time.</p>
            </div>
        </a>
    </div>
    <div class="col-md-6 col-lg-4">
        <a href="{{ url_for('meal_planner.mealplanner') }}" class="card-link">
            <div class="card feature-card feature-card-meals h-100">
                <div class="feature-icon"><i class="fas fa-utensils"></i></div>
                <h5>Meal Planner</h5>
                <p>Organize meals and recipes for the family.</p>
            </div>
        </a>
    </div>
    <div class="col-md-6 col-lg-4">
        <a href="{{ url_for('activity_planner.activityplanner') }}" class="card-link">
            <div class="card feature-card feature-card-activities h-100">
                <div class="feature-icon"><i class="fas fa-calendar-alt"></i></div>
                <h5>Activity Planner</h5>
                <p>Keep track of important family events.</p>
            </div>
        </a>
    </div>
</div>

{% endblock %}
